<div class="main">
  <h1>
  Matheus Almeida França - 250779 <br>
  Vitória Eduarda Correia - 171415
  </h1>
  <input class="lg-text-input" #campoNovoItem />
  <button class="btn-primary" (click)="CREATE_tarefa(campoNovoItem.value)">
    Adicionar Tarefa</button>
  <ul>
    <li *ngFor="let tarefaDoLoop of arrayDeTarefas()">
      <app-item [tarefa]="tarefaDoLoop" (removeTarefa)="DELETE_tarefa(tarefaDoLoop)"(modificaTarefa)="UPDATE_tarefa(tarefaDoLoop)">
      </app-item>
    </li>
  </ul>
</div>
